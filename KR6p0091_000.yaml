body:
  text: 淨土晨鐘自序戊巳之交豫輯金剛法華持驗諸紀又以佛法中最簡捷而通貫者莫如淨土一門因取古今之書表章是教者裒其精要類而編之曰晨鐘意欲用世人之朝氣警甜夢者而鼓鐘之焉耳冬初書成豫不揣竊取名賢論述之意而為之序序曰如來為一大事因緣出現于世大事者何生死是也如來憫衆生沉迷而指以出離之途即示以遄歸之所曰大慈曰能仁以其仁慈我衆生而名之也允哉乃衆生不自仁慈其身畢世沉迷以悖如來之教茫茫生死波中淵深而海濶周行震旦都如過銅人沒處頭髻長出嗟嗟有聲不亦哀乎今夫人之朝而必夕也暑而必寒也幼而必壯壯而必老老而必死也自古及今如是苟夫人之朝而不為夕謀暑而不為寒謀必群誚其愚獨自幼至壯且老而濵死不知為之謀其愚不又甚乎然人之不知謀死也非昏而忘之則畏而諱之耳忘之而卒至諱之而終不我貸則雖欲忘且諱之而庸可得耶且人之畏死又非真能畏死者也當其驀焉而生蠢焉而長頽焉而老以死栩栩焉蘧蘧焉而愛河欲海之溺人無已時名利韁鎖之牽人無已時一旦灰寒火傳薪換臨了一局誰人能免自茲以往滅滅生生六道三途如轉轆轤又誰人能免迹其所為日相尋于生死之業而不求解脫之方謂之愍不畏死可也真能畏死者必求解脫生死之方求解脫則舍念佛何途之從舍淨土吾誰與歸念佛生淨土則得解脫得解脫則超然生死之外亦翛然生死之中而又何死之足畏是能真畏死者也是能畏死謀死而終得無畏者也是能了當大事者也是能不悖大慈能仁之教者也夫世人而可免夫生死則已世人而不免夫生與死也則淨土之業其可以不修而是書其可以弗讀也哉或曰淨土人人可修則了當生死之法顧若是易乎曰中庸言達道達德舉生知安行而繼以學困勉強成功之一以聖凡無殊性故故孟子又曰道一可見此法非難非易其實人人可為即經所謂衆生是淨土及衆生煩惱心中皆具如來德相是也般若經云滅度無量衆生實無衆生得滅度者蓋度人只在自度內修淨土法門者雖止自度而使人皆學此法門自度其為度人也不既多乎故未悟者勿論即已悟而必自我度人其度也小我不必作度人相而即以自度者度人其度也太度而無度般若所云旨不出此然則論淨土者曰欲度衆生必先自度猶止説得一半或曰今人喜談即濁即淨不如捨濁取淨之有實益是圓不如別乎曰念佛門中諸根畢攝理悟同歸能捨濁取淨而即濁即淨之理亦具其中圓莫圓于是故即濁即淨之説尚是假圓而此淨土之圓為真圓或曰惟心淨土之説誠謬乎曰否究竟只是惟心淨土書中千萬語無非欲人歸依佛歸依佛無非心即佛耳蓮師最駁撥土言心之説而曰一心不亂是阿彌陀經之訣是心是佛是心作佛是觀經之訣可知心佛合一故能一心不亂不亂之心即是作佛之心即是無住平等之心即是惟心淨土之心故維摩經云欲得淨土但淨其心真鐵板語不容顛撲也或曰然則古今諸大知識痛辨惟心之説者非歟曰否從來言者之失徒在空談此心耳不思惟心淨土不可説現成空頭話須有修為工夫在念佛求生淨土正是修悟自性惟心之工夫處也此方念佛淨土華鮮念佛心弛淨土華萎鮮萎一由佛之念與不念念佛須是心念安得謂惟心之説之有謬乎故凡執心而議土與夫執土而議心其失均也大梅云任伊非心非佛我只是即心即佛吾亦曰任伊非心非土我只是即心即土請即以質之蓮池龍舒諸老何如若云此亦是隨人腳下盤旋語則宜一併掃去道不是不是觀經以十六觀為正因而又言三福三種心等都不復及修觀以方便多門六度萬行皆可回向西方故又末法般舟三昧經先滅無量壽經更留蓮池謂稱名易學觀想難成般舟先觀足輪亦觀經類耳而六字稱名則三尺童子辨之故無量壽經偏救末世由是觀之如來設教不可謂不寬淨土之門不可謂不廣獨稱名一法簡要可以通行故古今尊宿往往單提此門耳須知理外無事淺外無深故利鈍兼收非難非易若會事歸理則三福等俱入實相即是妙觀即稱名與觀想非屬二心其歸亦一且法何有末末法云者人末之世末之也先滅云云者或預懸以示警欲不以世與人之末而末法耳非為是便當舍難趨易也但學者從一門而入專勤為之淨業自成不可于同堂中自生秦越崇此而抑彼是故有理而無事者非法之至是境而非心者非法之至可深而不可淺可別而不可圓者非法之至可權而不可實可聖而不可凡可自為而不可與人共為者均非法之至且而學無生即無滅生與死二乎了妄即真真與妄二乎溪山異而明月同禪與淨二乎即十萬億國土而彈指可生遠與近二乎以足指按地而成金色世界娑婆與極樂二乎難勝何非清泰之鄉瞿曇得無法藏之後釋迦與阿彌二乎常寂光中遍包三土而土土相資同居與寂光二乎法之至者聖凡一也物我一也理事心境一也深淺一也權實一也別圓一也以至一死生一真妄一禪淨一遠近一釋迦彌陀一娑婆極樂一同居寂光夫是之謂一心不亂果能依是真實做去始也攝心而念佛念佛則心自淨心淨則土隨淨大惠禪師云人于一日中心不馳求不妄想不緣諸境便與三世諸佛諸大菩薩相契即此火宅塵勞便是解脫出三界之處修淨土者宜亦如是靠住一佛心心無間行之既久便可將四大所合之身一拳粉碎四大所合之世界一腳踢翻然後隨所聞見鳥語蟬吟牧歌樵唱即西方之無常苦空法音天樂也竹籬茅蓋即西方之金臺樓閣也飛泉鳴瀨即西方之寶池德水野芳嘉木即西方之寶網交羅妙華天雨也明師良友之儔木石鹿豕之侶即西方之諸上善人也何苦何樂何須何逆何邪魔何三毒等煩惱目前純是淨土則未來之決定往生可知到得厭世時無怖無亂不支不吾怡然拱手歸來故鄉不必問此際佛來迎與否能預知時日否聞異香奇樂否總是生平得力處到此決用得著決有好消息上品上生無疑也雖然此等曉曉皆為未看破人打之繞耳人但看得破守得定時凡苦樂淨穢疑信辨難紛紛之説且教一筆勾却如何順治己亥陽月陽羡淨業弟子周克復盥沐謹撰淨土晨鐘目録卷第一晨課觀經上品上生章般若波羅蜜多心經楞嚴大勢至念佛章念佛願文禮拜三歸俱同夕課夕課佛説阿彌陀經往生淨土呪念佛文禮拜三歸又慈雲願文善導臨睡入觀文原始一阿彌陀佛成佛阿彌釋迦分現淨穢佛為韋提希説淨業九品往生佛為父王説念佛龍樹菩薩勸念佛念佛十種功德淨土往生之因阿彌度生之因釋迦勸人念佛之因釋迦開導淨土之因四土往生本末三界六道輪回本末卷第二啓信二淨土有益生前淨土不妨俗事淨土佛無妄語淨土一念必生淨土腳踏實地淨土非仙可比淨土因果不妄淨土如明鏡日月淨土正信為要淨土該戒定慧淨土獨推阿彌淨土苦樂相比淨土為難信法淨土了生死淨土念佛有力淨土諸聖尊宿同歸卷第三勸修三勸急辨大事勸活物活計勸神隨業往勸兜率不如西方勸宿債須還富貴易墮勸為身後計勸佛心為心勸隨遇隨勸勸出世間孝勸人人念佛勸真實念佛勸學者念佛卷第四念佛法門四十聲念佛誦偈十氣十念六時晨昏念佛懺罪念佛一相念佛攝心調息念佛參禪念佛總論持名念佛總論念佛事理一心禮念觀想觀想佛毫一心三觀念佛論約心觀佛論一心三觀論圓修三觀生四淨土卷第五功行法門五孝養父母慈心不殺持戒十善發菩提心讀誦大乘淨心行善奉行衆善布施以上正因方便廉儉不妄取財省口腹淫欲兼福慧不慕尊榮不辭輕蔑禮懺施食放生居官以上助修卷第六䇿進六䇿願力策勇猛精進䇿攝心悟心策三種念佛䇿出家策在家䇿老者病者卷第七飭終七飭臨終往生正念飭臨終三疑四開飭十念往生飭父母往生飭眷屬往生飭護病者飭自念佛度冤親飭臨終請衆念佛飭未終思終卷第八正辨八辨生淨土救衆生辨見性悟道辨不修淨土五惑辨禪淨同歸辨念佛有益參禪辨禪宗淨土遲速辨得悟正宜往生辨心境非二辨淨土專志西方辨念佛修觀非著相辨念佛不可輕視辨參究念佛辨念佛融通宗教辨念佛心性身名辨理事非二心辨宜繁宜簡辨往生早暮辨一念往生辨念力重大辨業性本空辨心量廣大淨土非遠辨自心佛現辨不往而往無生而生辨欣厭取捨辨不信佛論附佛入中國考卷第九了俗九了色身之妄如二顏丙文無著身有真假齊生死用形骸得失了世染之妄輪回根本蛇喻對境真空四窮民今日方間出家後出家悟後有修了富貴之妄了浮生之妄了生死之妄獄喻防死勾當自家事醉生夢死徹悟生死根本了物緣之妄六根五蘊皆空真性廢心用心了心念之妄了邪教之妄附寄庫念經卷第十持驗十比丘往生慧遠慧永曇順僧睿曇恆道昞道敬慧恭慧虔曇鑒慧光道珍曇鸞智者大師道喻善導和尚法照少康懷玉道綽惟岸僧衒附啓芳圓果懷感辨才大行明瞻智覺禪師志通悟恩省常遵式懺主宗坦疏主子元法持基法師若愚宗賾知禮有巖智廉懷義宗本元照慧亨智圓可久明本善住瑩珂惟則普度楚琦祖香蓮大師黃州僧海寶宰官往生劉程之張野王仲回馬子雲白居易張迪王龍舒葛蘻胡闕楊傑文彥博馬玗鍾離瑾閻邦榮咎定國馮楫王敏仲吳子才蘇軾朱綱顧寶幢朱元正丁明登唐時附辨融覺浪余大成士民往生門公則周續之孫良庾銑宋滿王闐范儼孫忠沉銓計公金奭劉通志唐廷任楊嘉禕郭熙載戈以安孫大玗尼僧往生大明淨真悟性能奉法藏婦女往生隋后葛濟之妻姚婆溫諍文妻鄭氏王氏夫人馮氏夫人陸氏宜人樓氏秦氏鄭氏于媼方氏薛氏張母孫氏母徐氏楊選一妻湯公甫母惡人往生張善和雄俊仲明吳瓊陳企附俘囚物類往生鸚鵡鴝鵒雞蛇又雞淨土晨鐘目録終勸流通淨土晨鐘引經典所在流通即屬善緣福報無量故語云能以大乘法傳一人者當十善傳十人者當百善傳大貴人大豪傑大力量者當千善重刊廣布者當萬善況淨土法門超出生死輪回永不退轉直至成佛而後已是勸一人修淨土乃成就一衆生作佛也凡作佛者必度無量衆生彼所度之衆生皆由我而始其福報信不可窮盡故欲勸一切見者聞者廣大其心以佛之心為心使人人知之而盡生淨土龍舒所言自宜諦信不誣至法華華嚴二經尤佛説妙法中之最上乘觀音大士普度世間無剎不現往賢感通事迹歷昭然各為纂集以勸進修斯誠鈴鐸方來津梁末路之最方便門也戊戌秋豫輯金剛持驗已有流通小引敬懇同人茲刻淨土法華華嚴觀音持驗諸紀搜採載籍徵信古今頗殫心手之微勞用志歸依於不朽但拙刻板在此地未能廣傳他省既並生莊嚴佛土之中安可缺法事流通之勝復告當世善信獲見諸本不吝廣為刻施或仍原本或易新編其見聞欣及有關持驗者尤冀續緝於後一句讚揚即是一句獲持善根一念鼓動即是一念消弭罪業於以續佛慧命自利利他所謂護法諸神既護法寶自護弘法載寶之人斷斷不爽昔賢為劈窠圖勸人念佛後以他人念佛多生淨土乃歸功施圖之人亦得生淨土法施功德不可思議如是願與同人共勗之同善道人克復敬懇淨土日誦晨課淨業弟子周克復敬訂南無本師釋迦牟尼佛三稱開經偈無上甚深微妙法百千萬劫難遭遇我今見聞得受持願解如來真實義佛説觀無量壽佛經上品上生章佛告阿難及韋提希上品上生者若有衆生願生彼國者發三種心即便往生何等為三一者至誠心二者深心三者回向發願心具三心者必生彼國復有三種衆生當得往生何等為三一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念回向發願願生彼國具此功德一日乃至七日即得往生生彼國時此人精進勇猛故阿彌陀如來與觀世音大勢至無數化佛百千比丘聲聞大衆無量諸天七寶宮殿觀世音菩薩執金剛臺與大勢至菩薩至行者前阿彌陀佛放大光明照行者身與諸菩薩授手迎接觀世音大勢至與無數菩薩讚歎行者勸進其心行者見已歡喜踴躍自見其身乘金剛臺隨從佛後如彈指頃往生彼國生彼國已見佛色身衆相具足見諸菩薩色相具足光明寶林演説妙法聞已即悟無生法忍經須臾間歷事諸佛遍十方界於諸佛前次第受記還至本國得無量百千陀羅尼門是名上品上生者般若波羅蜜多心經觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄舍利子色不異空空不異色色即是空空即是色受相行識亦復如是舍利子是諸法空相不生不滅不垢不淨不增不減是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得以無所得故菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗故説般若波羅蜜多呪即説呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶楞嚴大勢至菩薩念佛章大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名曰香光莊嚴我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一念佛文願文禮拜三皈俱同夕課如在家人不能全誦或晨夕專持阿彌陀經往生呪佛號如夕課儀亦可淨土夕課南無蓮池海會佛菩薩三稱無上甚深微妙法百千萬劫難遭遇我今見聞得受持願解如來真實義佛説阿彌陀經如是我聞一時佛在舍衛國祗樹給孤獨園與大比丘僧千二百五十人俱皆是大阿羅漢衆所知識長老舍利弗摩訶目犍連摩訶迦葉摩訶迦旃延摩訶俱絺羅離婆多周利槃陀伽難陀阿難陀羅睺羅憍梵波提賓頭盧頗羅墮迦留陀夷摩訶劫賓那薄拘羅阿菟樓馱如是等諸大弟子并諸菩薩摩訶薩文殊師利法王子阿逸多菩薩乾陀訶提菩薩常精進菩薩與如是等諸大菩薩及釋提桓因等無量諸天大衆俱爾時佛告長老舍利弗從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在説法舍利弗彼土何故名為極樂其國衆生無有衆苦但受諸樂故名極樂又舍利弗極樂國土七重欄楯七重羅網七重行樹皆是四寶周匝圍繞是故彼國名為極樂又舍利弗極樂國土有七寶池八功德水充滿其中池底純以金沙布地四邊階道金銀琉璃玻璃合成上有樓閣亦以金銀琉璃玻璃𤥭璖赤珠瑪瑙而嚴飾之池中蓮華大如車輪青色青光黃色黃光赤色赤光白色白光微妙香潔舍利弗極樂國土成就如是功德莊嚴又舍利弗彼佛國土常作天樂黃金為地晝夜六時雨天曼陀羅華其土衆生常以清旦各以衣裓盛衆妙華供養他方十萬億佛即以食時還到本國飯食經行舍利弗極樂國土成就如是功德莊嚴復次舍利弗彼國常有種種奇妙雜色之鳥白鶴孔鸚鵡舍利迦陵頻伽共命之鳥是諸衆鳥晝夜六時出和雅音其音演暢五根五力七菩提分八聖道分如是等法其土衆生聞是音已皆悉念佛念法念僧舍利弗汝勿謂此鳥實是罪報所生所以者何彼佛國土無三惡道舍利弗其佛國土尚無惡道之名何況有實是諸衆鳥皆是阿彌陀佛欲令法音宣流變化所作舍利弗彼佛國土微風吹動諸寶行樹及寶羅網出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心舍利弗其佛國土成就如是功德莊嚴舍利弗於汝意云何彼佛何故號阿彌陀舍利弗彼佛光明無量照十方國無所障礙是故號為阿彌陀又舍利弗彼佛壽命及其人民無量無邊阿僧祇劫故名阿彌陀舍利弗阿彌陀佛成佛已來於今十劫又舍利弗彼佛有無量無邊聲聞弟子皆阿羅漢非是算數之所能知諸菩薩衆亦復如是舍利弗彼佛國土成就如是功德莊嚴又舍利弗極樂國土衆生生者皆是阿跋致其中多有一生補處其數甚多非是算數所能知之但可以無量無邊阿僧祗説舍利弗衆生聞者應當發願願生彼國所以者何得與如是諸上善人俱會一處舍利弗不可以少善根福德因緣得生彼國舍利弗若有善男子善女人聞説阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂其人臨命終時阿彌陀佛與諸聖衆現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土舍利弗我見是利故説此言若有衆生聞是説者應當發願生彼國土舍利弗如我今者讚歎阿彌陀佛不可思議功德之利東方亦有阿閦佛須彌相佛大須彌佛須彌光佛妙音佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗南方世界有日月燈佛名聞光佛大𦦨肩佛須彌燈佛無量精進佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗西方世界有無量壽佛無量相佛無量幢佛大光佛大明佛寶相佛淨光佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗北方世界有𦦨肩佛最勝音佛難沮佛日生佛網明佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗下方世界有師子佛名聞佛名光佛達磨佛法幢佛持法佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗上方世界有梵音佛宿王佛香上佛香光佛大𦦨肩佛雜色寶華嚴身佛娑羅樹王佛寶華德佛見一切義佛如須彌山佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗於汝意云何何故名為一切諸佛所護念經舍利弗若有善男子善女人聞是經受持者及聞諸佛名者是諸善男子善女人皆為一切諸佛之所護念皆得不退轉於阿耨多羅三藐三菩提是故舍利弗汝等皆當信受我語及諸佛所説舍利弗若有人已發願今發願當發願欲生阿彌陀佛國者是諸人等皆得不退轉於阿耨多羅三藐三菩提於彼國土若已生若今生若當生是故舍利弗諸善男子善女人若有信者應當發願生彼國土舍利弗如我今者稱讚諸佛不可思議功德彼諸佛等亦稱讚我不可思議功德而作是言釋迦牟尼佛能為甚難希有之事能於娑婆國土五濁惡世劫濁見濁煩惱濁衆生濁命濁中得阿耨多羅三藐三菩提為諸衆生説是一切世間難信之法舍利弗當知我於五濁惡世行此難事得阿耨多羅三藐三菩提為一切世間説此難信之法是為甚難佛説此經已舍利弗及諸比丘一切世間天人阿修羅等聞佛所説歡喜信受作禮而去佛説阿彌陀經拔一切業障根本得生淨土陀羅尼出小無量壽經曩謨阿彌跢婆夜哆他伽哆夜哆地夜他阿彌唎都婆毗阿彌唎哆悉耽婆毗阿彌唎哆毗迦蘭帝阿彌唎哆毗迦蘭哆伽彌膩伽伽那枳多迦隸娑婆訶三遍念佛文阿彌陀佛身金色相好光明無等倫白毫宛轉五須彌紺目澄清四大海光中化佛無數億化菩薩衆亦無邊四十八願度衆生九品咸令登彼岸南無西方極樂世界大慈大悲阿彌陀佛課千聲或五百聲南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩各十稱畢舉蓮大師西方願文稽首西方安樂國接引衆生大導師我今發願願往生唯願慈悲哀攝受弟子某甲衆等普為四恩三有法界衆生求於諸佛一乘無上菩提道故專心持念阿彌陀佛萬德洪名期生淨土又以業重福輕障深慧淺染心易熾淨德難成今於佛前翹勤五體披瀝一心投誠懺悔我及衆生曠劫至今迷本淨心縱貪嗔癡染穢三業無量無邊所作罪垢無量無邊所結冤業願悉消滅從於今日立深誓願遠離惡法誓不更造勤修聖道誓不退惰誓成正覺誓度衆生阿彌陀佛以慈悲願力當證知我當哀憫我當加被我願禪觀之中夢寐之際得見阿彌陀佛金色之身得歷阿彌陀佛寶嚴之土得蒙阿彌陀佛甘露灌頂光明照身手摩我頭衣覆我體使我宿障自除善根增長疾空煩惱頓破無明圓覺妙心廓然開悟寂光真境常得現前至於臨欲命終預知時至身無一切病苦厄難心無一切貪戀迷惑諸根悅豫正念分明捨報安詳如入禪定阿彌陀佛與觀音勢至諸聖賢衆放光接引垂手提携樓閣幢幡異香天樂西方聖境昭示目前令諸衆生見者聞者歡喜感嘆發菩提心我於爾時乘金剛臺隨從佛後如彈指頃生極樂國七寶池內勝蓮華中華開見佛見諸菩薩聞妙法音獲無生忍於須臾間承事諸佛親蒙授記得授記已三身四智五眼六通無量百千陀羅尼門一切功德皆悉成就然後不違安養回入娑婆分身無數遍十方剎以不可思議自在神力種種方便度脫衆生咸令離染還得淨心同生西方入不退地如是大願世界無盡衆生無盡業及煩惱一切無盡我願無盡願今禮佛發願修持功德回施有情四恩總報三有齊資法界衆生同圓種智南無阿彌陀佛禮願九拜作九品往生觀南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩各禮一拜次稱三皈自歸於佛當願衆生體解大道發無上心自歸於法當願衆生深入經藏智慧如海自歸於僧當願衆生統理大衆一切無礙和南聖衆各禮一拜又慈雲懺主願文不能誦前願文者用此亦可弟子某一心歸命西方極樂世界阿彌陀佛願以淨光照我慈誓攝我我今正念稱如來名為菩提道求生淨土佛昔本誓若有衆生欲生我國至心信樂稱我名號乃至十念若不生者不取正覺以此念佛因緣得入如來大誓海中承佛慈力衆罪消滅淨因增長若臨欲命終自知時至身無病苦心不貪戀意不顛倒如入禪定佛及聖衆手執金臺來迎接我於一念頃生極樂國華開見佛即聞佛乘頓開佛慧廣度衆生滿菩提願善導和尚臨睡入觀文弟子某生死凡夫罪障深重輪回六道苦不可言今遇知識得聞阿彌陀佛名號本願功德一心稱念求願往生願佛慈悲不捨哀憐攝受弟子某不識佛身相好光明願佛示現令我得見及見觀音勢至諸菩薩衆彼世界中清淨莊嚴光明妙相等令我了了得見正念入觀而寢不得雜想但久遠專志必如所願
