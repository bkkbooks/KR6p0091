body:
  text: 荊溪同善道人周克復纂男周石訂吳郡潛確居士陳濟生參淨土原始極樂是我故鄉阿彌號為慈父故欲超生死無如淨土一門世人浸沒五濁窟宅中如少亡之子問其祖父里邑室廬茫然不復記憶雖欲向往其路何由今折衷經籍溯其源流庶樂國歷歷如在目前而後信心可發也述原始第一阿彌陀佛成佛之始鼓音王經云過去劫中有國名妙喜王名憍尸迦祖父清泰國王父月上轉輪王母殊勝妙顏時有佛出世名世自在王憍尸迦心發道意棄捨國位投佛出家號曰法藏比丘即阿彌陀佛又大彌陀經云法藏比丘於自在王佛所發無上意一切世間無能及者時佛說二百一十億諸佛剎土應其心願法藏稽首禮佛廣說四十八願具載本經若不爾者誓不成佛是時大地震動天雨妙華空中同聲讚言決定成佛阿彌現淨土釋迦現穢土之始悲華經云往昔劫中有轉輪王名無諍念大臣名寶海為善知識同於寶藏佛所發菩提心無諍念發願云我修大乘取於淨土終不願於穢土成阿耨多羅三藐三菩提世界衆生無諸苦惱我不得如是佛剎乃不成正覺今既果滿號阿彌陀故現淨土寶海大臣願於穢土成熟有情今已果滿號釋迦牟尼於此濁惡世中成佛菩提佛為韋提希聖后說淨業正因觀無量壽佛經云爾時韋提希號泣向佛白言世尊願為我廣說無憂惱處我當往生不樂閻浮濁惡世也爾時世尊放眉間光遍照十方無量世界諸佛國土皆於中現韋提希見已白佛言是諸佛土雖復清淨皆有光明我今樂生極樂世界阿彌陀佛所惟願世尊教我思惟教我正受佛告韋提希阿彌陀佛去此不遠汝當繫念諦觀彼國我今廣為汝說亦令未來凡夫修淨業者得生西方極樂國土欲生彼國者當修三福一者孝順父母奉事師長慈心不殺修十善業二者受持三歸具足衆戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者如此三事名為淨業正因佛告阿難及韋提希諦聽諦聽善思念之九品往生觀經云上品上生者若有衆生發三種心即便往生一者至誠心二深信心三回向發願心復有三種衆生當得往生一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念念佛法僧天施戒為六念回向發願願生彼國具此功德一日乃至七日即得往生上品中生者不必受持讀誦方等經典善解義趣於第一義心不驚動深信因果不謗大乘以此功德回向求生極樂國行此行者即得往生上品下生者亦信因果不謗大乘但發無上道心以此功德回向願求生極樂國行者命欲終時即得往生中品上生者若有衆生受持五戒持八戒齊修行諸戒不造五逆無衆過患以此善根回向願求生於西方極樂世界臨命終時即得往生中品中生者若有衆生若一日一夜持八戒齊若一日一夜持沙彌戒若一日一夜持具足戒威儀無缺以此功德回向願求生極樂國戒香熏修如此行者命欲終時即得往生中品下生者若有善男子善女人孝養父母行世仁慈此人命欲終時遇善知識為其廣說阿彌陀佛國土樂事亦說法藏比丘四十八願聞此事已尋即命終即得往生下品上生者或有衆生作重惡業雖不誹謗方等經典如此愚人多造惡法無有慙愧命欲終時遇善知識為說大乘十二部經首題名字以聞如是諸經名故除却千劫極重惡業智者復教合掌叉手稱南無阿彌陀佛稱佛名故除五十億劫生死之罪即得往生下品中生者或有衆生毀犯五戒八戒及具足戒如是愚人偷僧祇物盜現前僧物不淨說法無有慙愧以諸惡業而自莊嚴如此罪人以惡業故應墮地獄命欲終時地獄衆火一時俱至遇善知識以大慈悲即為讚說阿彌陀佛十力威德廣讚彼佛光明神力亦讚戒定慧解脫解脫知見此人聞已除八十億劫生死之罪即得往生下品下生者或有衆生作不善業五逆十惡具諸不善如此愚人以惡業故應墮惡道經歷多劫受苦無窮臨命終時遇善知識種種安慰為說妙法教令念佛彼人苦逼不遑念佛善友告言汝若不能念彼佛者應稱無量壽佛如是至心令聲不絶具足十念稱南無阿彌陀佛稱佛名故於念念中除八十億劫生死之罪命終之時即得往生佛為父王說念佛寶積經云世尊父王頂禮佛足一心合掌而白佛言云何修行當得諸佛之道佛言一切衆生皆即是佛今當念西方世界阿彌陀佛常勤精進當得佛道王言一切衆生云何是佛佛言一切法無生無動搖無取捨無相㒵無自性可於此佛法中安住其心勿信於他爾時父王與七萬釋種聞說是法信解歡喜悟無生忍佛現微笑而說偈曰釋種決定智是故於佛法決信心安住人中命終已得生安樂國面奉阿彌陀無畏成菩提龍樹菩薩勸念佛大智度論云佛是無上法王諸大菩薩為法臣諸臣所尊重者惟佛法王是故菩薩應當念佛又云有諸菩薩自念往昔謗般若墮惡道經無量劫雖修餘行未能得出後遇善知識教行念佛三昧即得併遣罪障方得解脫又偈云若人願作佛心念阿彌陀即時為現身故我歸命禮若人欲疾得不退轉地者應以恭敬心執持稱名號若人種善根疑則花不開信心清淨者花開即見佛佛示人念佛十種功德經云若人受持一佛名號者見世當獲十種功德利益一晝夜常得諸天大力神將併諸眷屬隱形守護二常得二十五大菩薩如觀世音等及一切菩薩常隨守護三常為諸佛晝夜護念阿彌陀佛常放光明攝受此人四一切惡鬼若夜叉羅剎皆不能害一切毒蛇毒龍悉不能害五一切火難水難冤賊刀箭牢獄杻械橫死枉死悉皆不受六先所作罪皆悉消滅所殺冤命彼蒙解脫更無執對七夜夢正直或復夢見阿彌陀佛勝妙色身八心常歡喜顏色光澤氣力充盛所作吉利九常為一切世間人民恭敬供養禮拜猶如敬佛十命終之時心無怖畏正念現前得見阿彌陀佛及諸菩薩聖衆手持金臺接引往生西方淨土盡未來際受勝妙樂淨土往生之因大藏言西方淨土事不止十餘經其大略謂彼處以七寶莊嚴無地獄餓鬼禽畜以至蜎飛蠕動之類常清淨自厭無一切穢雜故名淨土其人皆蓮華中生長生不老衣食宅宇隨意化成其景序長春無復寒暑大受快樂無一切苦惱故名極樂世界其佛名阿彌陀者梵語也此云無量以此佛光明照見十方世界無有限量凡念佛衆生無不知之故又名無量光佛此佛壽命與其國中人民壽命皆無有限量雖恆河沙劫亦無有盡故又名無量壽佛此佛有大誓願度人其威神不可思議故至心信向念其名號者現世必消除災難禳却冤鬼安靜形神增延福壽西方七寶池中則生蓮華一朵他日於其中託生直脫輪回之外若此者皆有事跡非虗言也盡大藏中八萬四千法門無如此之要捷者而人或不知知而不行可痛惜也龍舒淨土文阿彌陀佛度生之因經云法藏比丘對世自在王佛發四十八大願每願皆為濟度衆生發此願已乃精進以了生死次入菩薩地了生死者乃生死自如也入菩薩地者內則修慧外則修福也修慧者使慧性日廣一日至成佛時則慧性含虗空世界無所不知無所不見也修福者託生於一切衆生中同其形體通其語言以設教化故上自天帝下至微細蟲蟻皆託生其中如此無量劫來設化衆生夫設化衆生無非得福也得福而不受用故其福愈積而愈大久則遍虗空世界矣福大則威神大又經云阿彌陀佛歷大阿僧祇劫行菩薩行忍力成就不計衆苦常以和顏愛語饒益衆生善護口業不譏他過善護身業不失律儀善護意業清淨無染手中常出一切衣服飲食寶幢音樂及一切最上所須之物以此施惠衆生令生歡悅以行教化故致無量衆生發無上菩提之心如是善行歷無數劫功德圓滿威神熾盛方得成就所願而入佛位是初發願以至成佛無非為衆生者故十方無央數世界諸天人民以至蜎飛蠕動之類無所不度人能精心念其名號想其形相現世必見佛之真身以佛威靈無所不在而人心念與佛純熟則自然交通也若身後經生其國皆於寶池蓮華中化生其容貌端好非天人可比皆受自然清虗之身無極之壽遍彼剎中皆諸上善人無有婦女皆洞視徹聽遙相瞻見遙相聞語聲雖歷萬劫已所從來靡不知之復知十方世界去來現在之事以其慧性通徹故爾又阿彌陀佛誓願云已生我國欲往他方生者如其所願永不復墜三惡道何則生淨土者必證無生法忍無生法忍者乃了生死也了生死者雖入生死界中此一性已不昧矣性既不昧何由而為惡乎況又仗佛力故墜墮必無由是設化一切衆生而入一切衆生生死界中或生天上或生人間或生大富貴中或生清淨中或長生不滅或滅而復生隨意所欲生死自如此所以貴於修淨土也纂龍舒文釋迦勸人念佛之因阿彌陀佛現在西方西方為淨土釋迦所生國與我中國同土皆屬娑婆世界皆為穢土穢土衆生必憶佛念佛一心不亂彌陀方來接引往生西方然彌陀聖號及淨土往生之事此土誰知緣釋迦如來說彌陀諸經殷勤苦口勸人念佛迦文不妄的確可信此震旦念佛法門之所由始也阿者無也彌陀者量也阿彌陀佛者無量覺也無量有二義無量壽體也無量光用也只無量光壽四字便是如來萬德洪名專持此四字即生淨土者何也蓋因彌陀發四十八願攝受衆生有云衆生欲生我國但能志心稱我名號即生我國受福快樂壽命無量佛有此本願故衆生念佛即得往生此是仗佛願力非衆生之自力自力難成仗佛易就故也釋迦開導淨土之因唐宜之南無篇云向於淨土書中聞阿彌陀佛取淨土釋迦佛取穢土君臣弘願攝受兩土衆生而未詳也又讀悲華經始知阿彌陀佛為轉輪聖王時供養寶藏如來黃金為地七寶為樓自燃身燈竟夜供養然猶回向為忉利大梵天王統領四天下而已爾時賴釋迦佛為寶海梵志乞夢陳白輪王感悟乃於寶藏如來前取西方淨土是則西方淨土成自彌陀而開導由釋迦也不惟是爾時輪王千子與八萬四千小王無一人不由寶海開示發心者太子即觀世音二王子即大勢至三王子即文殊八王子即普賢也不惟是爾時寶海有八十子與三億弟子無一人不由寶海開示同時發心者凡賢劫千佛與當來彌勒尊佛皆寶海弟子也秪因諸菩薩皆發心取清淨佛土而此娑婆世界厚重煩惱為佛菩薩之所擯棄於是寶海憂愁憔悴發願久在生死忍受諸苦不捨如是衆生願入阿鼻願為畜生願為餓鬼願為貧窮鬼神願為人中卑賤願施恆沙七寶願施恆沙身命以度衆生今人朝夕頂禮彌陀觀音勢至為大依怙若不讀此經安知三聖證果之因至念釋迦如來施足施首施手施耳施鼻舌施血肉施髓腦調伏我等豈能不慟哭乎然則釋迦當日以淨土開導三聖後說彌陀諸經又專為娑婆衆生而發是即以開示佛菩薩者而開示我等也以阿彌接引之大力合釋迦指點之悲心如此深恩衆生若何辜負也耶四土往生本末經云應觀法界性一切惟心造法界有十又分四種國土一曰常寂光土為佛法界二曰實報無障礙土為菩薩法界三日方便有餘土為聲聞緣覺二法界謂之四聖四曰凡聖同居土為天人阿修羅地獄餓鬼畜生六法界謂之六凡如是十界四土於凡夫一念識心悉皆具足故凡一土各具四土唯隨染淨緣以分淨穢維摩詰云隨其心淨則佛土淨此之謂也四土各有淨穢常寂光者諸佛如來所居常即法身德寂即解脫德光即般若德真常究竟極為淨土亦有淨穢者以究竟分證異也究竟如來所證乃上品寂光圓教人所證名中品寂光別教則證下品寂光耳實報無障礙者菩薩居之行真實法感得勝報色心不相妨礙故言無障礙等分十地皆屬大乘其淨穢以次第頓入分也次第者別教菩薩頓入者圓教菩薩方便有餘者二乘所居已出三界之外修方便道斷四住惑故曰方便無明未盡故曰有餘其淨穢相者體巧柝拙也體觀感淨拙觀感穢凡聖同居淨土者即極樂國是安養清淨池流八德樹列七珍次於泥洹皆正定聚生安養者煩惱調伏近於涅槃故名為次聚有三如此土博地凡夫屬邪定聚發心修行未不退者屬不定聚不退轉者稱正定聚穢土即娑婆世界其淨穢以五濁輕重而分也然佛法遍一切界下三土皆常寂光所遍故如來居寂光時垂應下三土釋迦現身垂應娑婆阿彌現身垂應極樂是也同居穢土之人欲生極樂淨土須以念佛三昧或執持名號一心不亂或端坐西向觀想彌陀如此二行方能輕其三毒澄其五濁臨終正念乃得往生若因此三昧破斷見思二惑即能往生方便土更破塵沙煩惱并破根本無明即得生實報土破盡無明方得生寂光淨土又有淨土橫出三界穢土竪出三界之異竪者自下升高如登九級臺其出難橫者從東至西如履坦途其出易據觀經往生九品橫出有三種如上品上生垂終乘金剛臺往生彼國見佛聞妙法已即悟無生此橫出三界生實報莊嚴淨土也上品中生者坐紫金臺往生彼國經宿乃開經一小劫得無生法忍此橫出生方便有餘淨土也上品下生以下皆橫出三界生凡聖同居淨土也極樂雖有天人之殊既無淫欲故無欲界生彼者次于泥洹皆正定聚則不隨禪而受生故無色界無無色界可即同居而證入上三土耳竪出三界有四種人即藏通別圓四教雖頓漸不同各有階級然後得出三界生死修為難而失墜易何如專心念佛仗佛提擕從橫而出生彼華池實報與寂光恆見十地直下可登之為愈乎按此十界四土之說諸淨土書多略而未載然衆生既願生彼土即當以成佛為期同居淨土之人不得生寂光未為究竟故往生後境地修持者不可不知況四土一土不出惟心所造此實凡聖同歸之途頓漸雙融之旨也三界六道輪回本末衆生因情生十二緣造成三界六道輪回之業不得斷絶往西方則情滅而性現故永劫無輪回有十二緣之業造成三界六道輪回之報不得解脫生西方則業斷而報空故永劫無墜墮十二緣者曰無明曰行曰識曰名色曰六入曰觸曰受曰愛曰取曰有曰生曰老死是也無明謂暗昧真性行謂動作識謂魂識名謂受想行識色謂色身六入謂六根眼耳鼻舌身意也觸謂觸六根者因暗昧真性故不能寂然不動乃生魂識因有名色遂有六入因六入故有觸因觸故受因受故愛因愛故取因取故當有之因此復受生因生故有老死相牽緣不斷故名十二緣三界者自阿鼻大地獄至他化自在天皆名欲界以有情欲也上有色界止有色身無男女之形又上有無色界亦無色身止有魂識如鬼神此名三界所謂輪回者何曰天曰人曰阿修羅曰餓鬼曰畜生曰地獄是名六道餓鬼以下亦名三途瞋殺傲慢造有微福感修羅道慳貪不捨損人利己感餓鬼道愚呆無知酬償宿債感畜生道五逆十惡輕重不等感地獄道四道皆苦天道修十善而致感報受樂樂勝則不暇修行福盡則仍墜落人道樂少苦多能勇猛精進可以修行而不發肯心報盡則轉墮三途人天為勝餘四為劣或劣者悔過而徵勝或勝者造惡而徵劣如車輪回轉升沉非一經云三界無安猶如火宅此之謂也業報可畏如此曷不回頭猛省求生西方已上克復纂
